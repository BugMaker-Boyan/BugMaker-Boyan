<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="250" viewBox="0 0 1200 250" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1026" />
      <stop offset="35%" stop-color="#161D47" />
      <stop offset="70%" stop-color="#1E2B62" />
      <stop offset="100%" stop-color="#101637" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.2)" />
      <stop offset="50%" stop-color="rgba(255, 255, 255, 0.0)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.2)" />
    </linearGradient>
  </defs>

  <rect width="1200" height="250" fill="url(#bg)" />

  <path d="M0 140 Q 150 90 300 120 Q 450 150 600 110 Q 750 70 900 120 Q 1050 160 1200 120 L 1200 250 L 0 250 Z"
    fill="rgba(139,233,255,0.14)">
    <animate attributeName="d"
      dur="7s"
      repeatCount="indefinite"
      values="
      M0 140 Q 150 90 300 120 Q 450 150 600 110 Q 750 70 900 120 Q 1050 160 1200 120 L 1200 250 L 0 250 Z;
      M0 130 Q 150 95 300 130 Q 450 165 600 120 Q 750 80 900 135 Q 1050 150 1200 135 L 1200 250 L 0 250 Z;
      M0 140 Q 150 90 300 120 Q 450 150 600 110 Q 750 70 900 120 Q 1050 160 1200 120 L 1200 250 L 0 250 Z"
      />
  </path>

  <path d="M0 165 Q 150 130 300 155 Q 450 185 600 150 Q 750 110 900 165 Q 1050 190 1200 160 L 1200 250 L 0 250 Z"
    fill="rgba(216,163,255,0.12)">
    <animate attributeName="d"
      dur="9s"
      repeatCount="indefinite"
      values="
      M0 165 Q 150 130 300 155 Q 450 185 600 150 Q 750 110 900 165 Q 1050 190 1200 160 L 1200 250 L 0 250 Z;
      M0 170 Q 150 125 300 150 Q 450 190 600 145 Q 750 115 900 175 Q 1050 185 1200 150 L 1200 250 L 0 250 Z;
      M0 165 Q 150 130 300 155 Q 450 185 600 150 Q 750 110 900 165 Q 1050 190 1200 160 L 1200 250 L 0 250 Z"
      />
  </path>

  <g opacity="0.8">
    <circle cx="220" cy="70" r="6" fill="#D8A3FF">
      <animate attributeName="r" values="5;8;5" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="520" cy="45" r="4" fill="#8BE9FF">
      <animate attributeName="r" values="3;7;3" dur="2.4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="930" cy="90" r="5" fill="#A78BFA">
      <animate attributeName="r" values="4;6;4" dur="2.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.25;0.8;0.25" dur="2.8s" repeatCount="indefinite" />
    </circle>
  </g>

  <rect x="0" y="0" width="1200" height="250" fill="url(#shine)" />

  <text x="70" y="95" font-size="58" font-family="'Segoe UI', 'Poppins', 'Noto Sans SC', sans-serif" fill="#8BE9FF" font-weight="700">
    Boyan Li
  </text>
  <text x="72" y="138" font-size="27" font-family="'Segoe UI', 'Poppins', 'Noto Sans SC', sans-serif" fill="#D8A3FF" opacity="0.95">
    Text-to-SQL · Data Agents · Cute Data Intelligence
  </text>

  <text x="70" y="190" font-size="22" font-family="'Segoe UI', 'Poppins', 'Noto Sans SC', sans-serif" fill="rgba(216,163,255,0.95)">
    HKUST (Guangzhou) · Data Science and Analytics
  </text>
</svg>
